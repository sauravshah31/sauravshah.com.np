<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Saurav Shah{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@600;700;800&family=Noto+Serif+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ '../' * ((current_path.count('/') + 1) if current_path else 0) }}static/css/style.css">
</head>
<body>
    <!-- Theme Toggle Buttons -->
    <div class="theme-controls">
        <button id="nightModeToggle" class="theme-btn" title="Toggle Night Mode">
            <i class="fas fa-moon"></i>
        </button>
    </div>
    
    {% block content %}{% endblock %}
    
    <script src="{{ '../' * ((current_path.count('/') + 1) if current_path else 0) }}static/js/main.js"></script>
</body>
</html>
