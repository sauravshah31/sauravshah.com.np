<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Saurav Shah{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@600;700;800&family=Noto+Serif+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ '../' * ((current_path.count('/') + 1) if current_path else 0) }}static/css/style.css">
</head>
<body>
    <!-- Theme Toggle Buttons -->
    <div class="theme-controls">
        <button id="nightModeToggle" class="theme-btn" title="Toggle Night Mode">
            <i class="fas fa-moon"></i>
        </button>
    </div>
    
    {% block content %}{% endblock %}

    <!-- Comment Section -->
    <section class="comment-section">
        <div class="container">
            <div class="comment-box">
                <div class="comment-header">
                    <span class="comment-ornament">✦</span>
                    <h2 class="comment-heading">Have something to say?</h2>
                    <p class="comment-subtext">Leave a note — I'd love to hear from you.</p>
                </div>
                <form id="commentForm" class="comment-form" novalidate>
                    <input type="hidden" name="access_key" value="139718d8b6b04a80b4cbf4d9e00ca16b">
                    <input type="hidden" name="title" value="{{ page_title | default('Saurav Shah') }}">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="commentName">Name</label>
                            <input type="text" id="commentName" name="name" placeholder="Your name" required>
                        </div>
                        <div class="form-group">
                            <label for="commentEmail">Email <span class="form-optional">(optional)</span></label>
                            <input type="email" id="commentEmail" name="email" placeholder="your@email.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="commentMessage">Message</label>
                        <textarea id="commentMessage" name="message" rows="5" placeholder="Share your thoughts…" required></textarea>
                    </div>
                    <div class="form-footer">
                        <button type="submit" class="comment-submit" id="commentSubmit">
                            <i class="fas fa-paper-plane"></i>
                            <span>Send Message</span>
                        </button>
                        <p class="form-status" id="formStatus" aria-live="polite"></p>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script src="{{ '../' * ((current_path.count('/') + 1) if current_path else 0) }}static/js/main.js"></script>
</body>
</html>
